<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <!-- stylesheet -->
    <link rel="stylesheet" href="css/index.css">

    <!-- lordicon lib -->
    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- sidebar -->
    <aside class="sidebar_container">

        <div class="close_button_container">
            <div class="close_button"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <h1>SS STORE</h1>
        <ul class="navigation_list">
            <li id="products" class="icon_hover">
                <a href="/dashboard.html">
                    <lord-icon src="https://cdn.lordicon.com/jeuxydnh.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Dashboard
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/products.html">
                    <lord-icon src="https://cdn.lordicon.com/qfijwmqj.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Products
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/orders.html">
                    <lord-icon src="https://cdn.lordicon.com/uisoczqi.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Orders
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/users.html">
                    <lord-icon src="https://cdn.lordicon.com/fqbvgezn.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Users
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/settings.html">
                    <lord-icon src="https://cdn.lordicon.com/fwkrbvja.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Settings
                </a>
            </li>
        </ul>
    </aside>


    <main>

        <!-- navbar -->
        <header>
            <nav class="navbar">
                <div class="navbar_left_box">
                    <div class="drawer"><i class="fa-solid fa-table-columns"></i></div>
                    <p>Welcome back, Admin</p>
                </div>
                <div class="navbar_right_box">
                    <img class="avatar_img" src="assets/user-profile-dark.svg" alt="avatar">
                </div>
            </nav>
        </header>

        <!-- content -->
        <section class="main_content">

            <!-- products-content -->
            <div class="app_content">

                <button id="add-product" class="add_button">Add Product</button>

                <div class="parent_holder">

                    <div class="parent_container">

                        <div class="row row_five row_header">
                            <div>Image</div>
                            <div>Name</div>
                            <div>Price (Rs)</div>
                            <div>Stock</div>
                            <div>Actions</div>
                        </div>

                        <div class="row_parent product_row_parent">

                            <div class="row row_five">
                                <div class="image_box boxes">
                                    <img src="assets/shopping.webp" alt="">
                                </div>
                                <div class="name_box boxes">Shoes</div>
                                <div class="price_box boxes">1200</div>
                                <div class="stock_box boxes">25</div>
                                <div class="action_box boxes">
                                    <lord-icon src="https://cdn.lordicon.com/exymduqj.json" trigger="loop"
                                        colors="primary:#109121,secondary:#109121">
                                    </lord-icon>
                                    <lord-icon src="https://cdn.lordicon.com/jzinekkv.json" trigger="hover"
                                        colors="primary:#e83a30,secondary:#e83a30">
                                    </lord-icon>
                                </div>
                            </div>

                        </div>

                    </div>

                </div>


            </div>

        </section>


    </main>



    <script type="module" src="js/index.js"></script>
</body>

</html>
