<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <!-- stylesheet -->
    <link rel="stylesheet" href="css/index.css">

    <!-- lordicon lib -->
    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- sidebar -->
    <aside class="sidebar_container">

        <div class="close_button_container">
            <div class="close_button"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <h1>SS STORE</h1>
        <ul class="navigation_list">
            <li id="products" class="icon_hover">
                <a href="/dashboard.html">
                    <lord-icon src="https://cdn.lordicon.com/jeuxydnh.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Dashboard
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/products.html">
                    <lord-icon src="https://cdn.lordicon.com/qfijwmqj.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Products
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/orders.html">
                    <lord-icon src="https://cdn.lordicon.com/uisoczqi.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Orders
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/users.html">
                    <lord-icon src="https://cdn.lordicon.com/fqbvgezn.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Users
                </a>
            </li>
            <li id="products" class="icon_hover">
                <a href="/settings.html">
                    <lord-icon src="https://cdn.lordicon.com/fwkrbvja.json" colors="primary:#ffffff,secondary:#ffffff">
                    </lord-icon>
                    Settings
                </a>
            </li>
        </ul>
    </aside>


    <main>

        <!-- navbar -->
        <header>
            <nav class="navbar">
                <div class="navbar_left_box">
                    <div class="drawer"><i class="fa-solid fa-table-columns"></i></div>
                    <p>Welcome back, Admin</p>
                </div>
                <div class="navbar_right_box">
                    <img class="avatar_img" src="assets/user-profile-dark.svg" alt="avatar">
                </div>
            </nav>
        </header>

        <!-- content -->
        <section class="main_content">

             <!-- settings-content -->
            <div class="form_app_content">

                <h2>Admin Profile</h2>

                <form id="admin-form">


                    <div class="form_group">
                        <label for="image">Choose Profile Photo:</label>
                        <input type="file" name="image" id="image" accept="image/*">
                    </div>


                    <div class="form_group">
                        <label for="name">Admin Name:</label>
                        <input type="text" name="name" id="name">
                    </div>

                    <div class="form_group">
                        <label for="email">Admin Email:</label>
                        <input type="email" name="email" id="email">
                    </div>

                    <div class="form_group">
                        <label for="password">Admin Password:</label>
                        <input type="password" name="password" id="password">
                    </div>

                    <button id="save-detail" type="submit">Save Details</button>

                    <p class="error-msg"></p>


                </form>


            </div>


        </section>


    </main>



    <script type="module" src="js/index.js"></script>
</body>

</html>
