    <!--------------- Modals ---------------------->

    <div class="modal_overlay_container">

        <div class="modal_parent_container">

            <div class="modal_close_button_container">
                <div class="modal_close_button"><i class="fa-solid fa-xmark"></i></div>
            </div>

            <!-- add form -->
            <div class="modal_add_content_box">
                <h2>Add Product</h2>
                <form id="add-form">

                    <div class="form_group">
                        <label for="add-image">Choose Image:</label>
                        <div class="preview_image_box_add">
                            <img id="image-preview"
                                src="https://cdn.dummyjson.com/product-images/beauty/eyeshadow-palette-with-mirror/thumbnail.webp"
                                alt="preview" hidden>
                            <input id="add-image" name="image" type="file" accept="image/*" required>
                        </div>
                    </div>

                    <div class="form_group">
                        <label for="add-title">Title:</label>
                        <input id="add-title" name="title" type="text" required>
                    </div>

                    <div class="form_group">
                        <label for="add-price">Price:</label>
                        <input id="add-price" name="price" type="number" min="0" step="any" required>
                    </div>

                    <div class="form_group">
                        <label for="add-stock">Stock:</label>
                        <input id="add-stock" name="stock" type="number" min="0" required>
                    </div>

                    <div class="add_form_buttons">
                        <button id="submit-button-add" class="submit" type="submit">Add</button>
                        <button id="cancel-button-add" class="cancel" type="button">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- edit form -->
            <div class="modal_edit_content_box">
                <h2>Edit Product</h2>
                <form id="edit-form">

                    <div class="form_group">
                        <label for="edit-image">Choose Image:</label>
                        <div class="preview_image_box">
                            <img id="edit-image-preview" src="#" alt="preview">
                            <input id="edit-image" name="image" type="file" accept="image/*">
                        </div>
                    </div>

                    <div class="form_group">
                        <label for="edit-title">Title:</label>
                        <input id="edit-title" name="title" type="text">
                    </div>

                    <div class="form_group">
                        <label for="edit-price">Price:</label>
                        <input id="edit-price" name="price" type="number" min="0" step="any">
                    </div>

                    <div class="form_group">
                        <label for="edit-stock">Stock:</label>
                        <input id="edit-stock" name="stock" type="number" min="0">
                    </div>

                    <div class="edit_form_buttons">
                        <button id="submit-button-edit" class="submit" type="submit">Update Details</button>
                        <button id="cancel-button-edit" class="cancel">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- order details -->
            <div class="modal_order_content_box">
                <h2>Order <span class="order_id">#1001</span> Details</h2>

                <div class="order_details_container">
                    <div class="order_box_group">
                        <div class="order_title"><strong>Customer :</strong></div>
                        <div class="order_desc customer_name">Rahul Sharma</div>
                    </div>
                    <div class="order_box_group">
                        <div class="order_title"><strong>Date :</strong></div>
                        <div class="order_desc order_date">2026-03-01</div>
                    </div>
                    <div class="order_box_group">
                        <div class="order_title"><strong>Payment :</strong></div>
                        <div class="order_desc payment_status">Paid</div>
                    </div>
                    <div class="order_box_group">
                        <div class="order_title"><strong>Status :</strong></div>
                        <div class="order_desc order_status">Delivered</div>
                    </div>
                    <hr>
                    <div class="order_box_group order_products_container">

                        <div class="order_products_header">
                            <div>Products <span class="products_count">(8)</span></div>
                            <div>Quantity</div>
                            <div>Price (Rs)</div>
                        </div>

                    <hr>
                    <div class="order_box_group">

                        <div class="order_desc order_total">Rs 32</div>
                    </div>
                </div>
